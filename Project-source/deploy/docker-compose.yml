# Terrane 单机交付(docker-compose)。集群版见 helm/。同一镜像,双规格。
name: terrane
services:
  postgres:
    build: { context: ../../Project-design/poc, dockerfile: Dockerfile.terrane-postgres }
    image: terrane-postgres:1.0
    environment:
      POSTGRES_USER: terrane_app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - pgdata:/var/lib/postgresql        # PG18+:挂父目录(数据落版本化子目录),不可挂 .../data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck: { test: ["CMD-SHELL", "pg_isready -U terrane_app"], interval: 10s, timeout: 5s, retries: 10 }
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    volumes: [ "redisdata:/data" ]
    healthcheck: { test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"], interval: 10s, timeout: 5s, retries: 10 }
    restart: unless-stopped

  terrane-server: &pybase
    build: { context: ../terrane-server }
    environment: &pyenv
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_USERNAME: terrane_app
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_SSL_MODE: disable
      DATABASE_NAME: terrane_main
      CACHE_HOST: redis
      CACHE_PORT: "6379"
      CACHE_PASSWORD: ${REDIS_PASSWORD}
      TERRANE_KEK: ${TERRANE_KEK}
      TERRANE_FORGE_EDGE_URL: ${TERRANE_FORGE_EDGE_URL}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE}
      # License:共享卷(active.forge + install_id 三组件共享部署身份;激活持久化);verifier_state 各组件独立
      TERRANE_LICENSE_PATH: /var/lib/terrane/license/active.forge
      TERRANE_LICENSE_CRL_PATH: /var/lib/terrane/license/crl.forge
      TERRANE_LICENSE_STATE_PATH: /var/lib/terrane/license/state_server.json
    command: ["sh","-c","python -m alembic upgrade head && python main.py"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes: [ "license:/var/lib/terrane/license" ]
    restart: unless-stopped

  terrane-admin-server:
    <<: *pybase
    build: { context: ../terrane-admin-server }
    environment:
      <<: *pyenv
      DATABASE_NAME: terrane_admin
      TERRANE_LICENSE_STATE_PATH: /var/lib/terrane/license/state_admin.json
    command: ["sh","-c","python -m app.cli migrate up && python -m app.cli bootstrap --silent && python main.py"]

  terrane-gateway:
    build: { context: ../terrane-gateway }
    depends_on: [ terrane-server, terrane-admin-server ]
    restart: unless-stopped

  terrane-web:
    build: { context: ../terrane-web }
    depends_on: [ terrane-server ]
    ports: [ "8080:80" ]
    restart: unless-stopped

  terrane-admin-web:
    build: { context: ../terrane-admin-web }
    depends_on: [ terrane-admin-server ]
    ports: [ "8081:80" ]
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  license:
