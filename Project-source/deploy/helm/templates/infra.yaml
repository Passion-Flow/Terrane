apiVersion: apps/v1
kind: StatefulSet
metadata: { name: {{ .Release.Name }}-postgres }
spec:
  serviceName: {{ .Release.Name }}-postgres
  replicas: 1
  selector: { matchLabels: { app: {{ .Release.Name }}-postgres } }
  template:
    metadata: { labels: { app: {{ .Release.Name }}-postgres } }
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          env:
            - { name: POSTGRES_USER, value: terrane_app }
            - { name: POSTGRES_DB, value: postgres }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: {{ .Release.Name }}-secrets, key: postgresPassword } }
          ports: [ { containerPort: 5432 } ]
          volumeMounts: [ { name: data, mountPath: /var/lib/postgresql/data } ]
  volumeClaimTemplates:
    - metadata: { name: data }
      spec: { accessModes: [ReadWriteOnce], resources: { requests: { storage: {{ .Values.postgres.storage }} } } }
---
apiVersion: v1
kind: Service
metadata: { name: {{ .Release.Name }}-postgres }
spec: { selector: { app: {{ .Release.Name }}-postgres }, ports: [ { port: 5432, targetPort: 5432 } ] }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: {{ .Release.Name }}-redis }
spec:
  replicas: 1
  selector: { matchLabels: { app: {{ .Release.Name }}-redis } }
  template:
    metadata: { labels: { app: {{ .Release.Name }}-redis } }
    spec:
      containers:
        - name: redis
          image: {{ .Values.redis.image }}
          args: ["redis-server","--requirepass","$(REDIS_PASSWORD)"]
          env:
            - name: REDIS_PASSWORD
              valueFrom: { secretKeyRef: { name: {{ .Release.Name }}-secrets, key: redisPassword } }
          ports: [ { containerPort: 6379 } ]
---
apiVersion: v1
kind: Service
metadata: { name: {{ .Release.Name }}-redis }
spec: { selector: { app: {{ .Release.Name }}-redis }, ports: [ { port: 6379, targetPort: 6379 } ] }
