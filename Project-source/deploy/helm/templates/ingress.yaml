{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress
  labels:
    {{- include "terrane.labels" . | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - { path: /, pathType: Prefix, backend: { service: { name: {{ .Release.Name }}-web, port: { number: 80 } } } }
    - host: {{ .Values.ingress.adminHost }}
      http:
        paths:
          - { path: /, pathType: Prefix, backend: { service: { name: {{ .Release.Name }}-admin-web, port: { number: 80 } } } }
{{- end }}
