server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  client_max_body_size 32m;
  location /admin-api/ { proxy_pass http://terrane-admin-server:43003; proxy_set_header Host $host; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_buffering off; }
  location /livez      { proxy_pass http://terrane-admin-server:43003; }
  location / { try_files $uri /index.html; }
}
