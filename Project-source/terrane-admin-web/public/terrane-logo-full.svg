<svg viewBox="0 0 600 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Terrane">
  <defs>
    <linearGradient id="word" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#e8efee"/>
    </linearGradient>
  </defs>
  <!-- Stacked cards: back card (outlined, slightly rotated, peeking out behind) -->
  <g transform="rotate(-5 300 250)">
    <rect x="168" y="150" width="264" height="188" rx="34" fill="none" stroke="#ffffff" stroke-width="9"/>
  </g>
  <!-- Front card (solid white) + top folder tab -->
  <path d="M196 196
           h128
           a18 18 0 0 1 17 12
           l4 12 h41
           a30 30 0 0 1 30 30
           v74
           a30 30 0 0 1 -30 30
           h-184
           a30 30 0 0 1 -30 -30
           v-98
           a30 30 0 0 1 30 -30 z"
        fill="#ffffff"/>
  <!-- T glyph (knocked out in black within the front card) -->
  <text x="300" y="312" text-anchor="middle" font-family="Geist, system-ui, sans-serif" font-size="150" font-weight="800" fill="#0a0a0a">T</text>
  <!-- Wordmark -->
  <text x="300" y="470" text-anchor="middle" font-family="Geist, system-ui, sans-serif" font-size="104" font-weight="800" letter-spacing="10" fill="url(#word)">TERRANE</text>
  <text x="300" y="530" text-anchor="middle" font-family="Geist, system-ui, sans-serif" font-size="32" font-weight="600" letter-spacing="24" fill="#cfd8d6">SINCE 2026</text>
</svg>
