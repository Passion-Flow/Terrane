server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  client_max_body_size 32m;
  location /api/    { proxy_pass http://terrane-server:43001; proxy_set_header Host $http_host; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_buffering off; }
  location /mcp     { proxy_pass http://terrane-server:43001; proxy_set_header Host $http_host; proxy_set_header X-Forwarded-Proto $scheme; proxy_buffering off; }
  location /livez   { proxy_pass http://terrane-server:43001; }
  location /metrics { proxy_pass http://terrane-server:43001; }
  location / { try_files $uri /index.html; }
}
