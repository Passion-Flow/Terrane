# ==================================================================================================
# Secrets + datastores (license / database / cache).
# ==================================================================================================

# Field-encryption + license secrets. REQUIRED.
secret:
  # TERRANE_KEK — master key encrypting SMTP password / 2FA secrets / stored credentials.
  # Generate: openssl rand -base64 32. The backend FAILS CLOSED in production when empty.
  # Back this up with your data; losing it makes existing ciphertext permanently unrecoverable.
  kek: "#REPLACE_ME#"

# License (Forge) configuration. The product ships LOCKED and must be activated.
license:
  # Online-activation edge URL (Forge). Leave EMPTY for offline-only (air-gapped) activation, where an
  # operator pastes a signed .forge license blob in the admin console instead. Example: http://forge-edge:8081
  forgeEdgeUrl: ""
  # Shared deployment identity for ALL components (server / admin-server / gateway). REQUIRED so that
  # activating in the admin console also unlocks the front app — without it each pod gets its own
  # fingerprint and you'll see the admin "activated" while the front app stays "not activated".
  # Generate ONCE: openssl rand -hex 16. One
  # cluster = one uid; do NOT change after activating (would require re-activation).
  deploymentUid: "#REPLACE_ME#"
  # Shared license volume holding active.forge + install_id, so the three control planes (server /
  # admin-server / gateway) share ONE deployment identity (anti-clone double-lock) and activation
  # survives restarts. Empty = use the cluster default StorageClass.
  storageClass: ""
  # Access mode for the shared license PVC. ReadWriteMany is required when the control-plane pods can
  # land on different nodes (needs an RWX class such as NFS/CephFS). With ReadWriteOnce keep the control
  # planes co-scheduled (replicas: 1, default) so they share the single-node volume.
  accessMode: ReadWriteMany
  # Size of the license PVC (tiny — a few KB of credentials).
  size: 1Gi

# Bundled PostgreSQL 18 + Apache AGE + pgvector. This exact stack is REQUIRED — AGE powers the
# knowledge graph and pgvector powers semantic retrieval; Terrane will not run without them.
postgres:
  # Deploy the bundled terrane-postgres StatefulSet. DEFAULT false — a proper private deployment uses
  # a customer-managed PostgreSQL (fill externalDatabase below). Set true only for a quick single-host
  # bring-up; the bundled DB must also provide the `age` and `vector` extensions (the terrane-postgres
  # image does).
  enabled: false
  # Container image for the bundled PostgreSQL (PG18 + AGE + pgvector).
  image:
    # Full image repository. Defaults to the Aliyun mirror.
    repository: crpi-ew8juv9423tvogc4.cn-hongkong.personal.cr.aliyuncs.com/navtra-mirror/terrane-postgres
    # Image tag.
    tag: v1.0.0
    # imagePullPolicy: IfNotPresent | Always | Never.
    pullPolicy: IfNotPresent
  # Full-privilege business DB account (used by both control planes). Two logical DBs are created on
  # first init: terrane_main (platform) + terrane_admin (operators).
  username: terrane_app
  # Password for the DB account. REQUIRED when postgres.enabled=true. Generate: openssl rand -base64 24.
  password: "#REPLACE_ME#"
  # StorageClass for the Postgres data PVC. Empty = cluster default.
  storageClass: ""
  # Size of the Postgres data PVC. Grow this for large knowledge bases.
  size: 20Gi
  # CPU/memory requests + limits for the Postgres pod. Empty {} = no limit. Demo below — tune for your KB size.
  resources: {}
  #  requests:
  #    cpu: 500m
  #    memory: 1Gi
  #  limits:
  #    cpu: 2
  #    memory: 4Gi

# External database — the DEFAULT, required path for a private deployment (used when postgres.enabled
# =false above). Must be a PostgreSQL-compatible engine (incl. Xinchuang (domestic) openGauss / PolarDB-PG) that
# provides the `age` and `vector` extensions, with two databases reachable: terrane_main + terrane_admin.
externalDatabase:
  # Use an external customer-managed database. Keep true for private deployment (pair with postgres.enabled=false).
  enabled: true
  # Database host. Example: pg.internal.example.com
  host: "#REPLACE_ME#"
  # Database port.
  port: 5432
  # Business DB account.
  username: terrane_app
  # Business DB account password.
  password: "#REPLACE_ME#"
  # TLS mode for the DB connection: disable | prefer | require | verify-ca | verify-full.
  sslMode: prefer

# Bundled Redis (cache + rate limiting).
redis:
  # Deploy the bundled Redis StatefulSet. DEFAULT false — a proper private deployment uses a
  # customer-managed Redis (fill externalRedis below). Set true only for a quick single-host bring-up.
  enabled: false
  # Container image for the bundled Redis (terrane-redis = upstream redis:7-alpine re-tagged, so
  # everything is pulled from one registry for air-gapped / Xinchuang (domestic) delivery).
  image:
    # Full image repository. Defaults to the Aliyun mirror.
    repository: crpi-ew8juv9423tvogc4.cn-hongkong.personal.cr.aliyuncs.com/navtra-mirror/terrane-redis
    # Image tag.
    tag: v1.0.0
    # imagePullPolicy: IfNotPresent | Always | Never.
    pullPolicy: IfNotPresent
  # Redis password. REQUIRED when redis.enabled=true. Generate: openssl rand -base64 24.
  password: "#REPLACE_ME#"
  # StorageClass for the Redis AOF PVC. Empty = cluster default.
  storageClass: ""
  # Size of the Redis PVC.
  size: 5Gi

# External Redis — the DEFAULT, required path for a private deployment (used when redis.enabled=false above).
externalRedis:
  # Use an external customer-managed Redis. Keep true for private deployment (pair with redis.enabled=false).
  enabled: true
  # Redis host. Example: redis.internal.example.com
  host: "#REPLACE_ME#"
  # Redis port.
  port: 6379
  # Redis password (leave empty if the external Redis has no auth).
  password: "#REPLACE_ME#"

# ==================================================================================================
# Object storage — uploaded originals + per-page WebP layout images (knowledge-base preview).
# Bundled self-hosted default = SeaweedFS (S3-compatible). To use a cloud bucket: set type to one of
# s3 / aliyun-oss / tencent-cos / volcengine-tos / huawei-obs / azure-blob / google-storage, fill
# endpoint + accessKey/secretKey, and set seaweedfs.enabled=false.
# ==================================================================================================
objectStorage:
  type: "local"          # local(bundled SeaweedFS) / s3 / aliyun-oss / tencent-cos / volcengine-tos / huawei-obs / azure-blob / google-storage
  localMode: "s3"        # s3 = delegate to SeaweedFS; filesystem = local disk
  bucket: "terrane"
  region: "us-east-1"
  secure: false          # http to the in-cluster SeaweedFS; true for cloud over https
  # Endpoint used ONLY when seaweedfs.enabled=false (a cloud / external S3 endpoint).
  endpoint: ""
  accessKey: "terrane_app"
  secretKey: "Seaweedfs@!QAZxsw2."

# Bundled SeaweedFS (S3-compatible object storage). Set enabled=false to use a cloud bucket instead.
seaweedfs:
  enabled: true
  image:
    repository: crpi-ew8juv9423tvogc4.cn-hongkong.personal.cr.aliyuncs.com/navtra-mirror/terrane-seaweedfs
    tag: v1.0.0
    pullPolicy: IfNotPresent
  resources: {}
  #  requests: { cpu: 100m, memory: 256Mi }
  #  limits:   { cpu: "1",  memory: 1Gi }
  storageClass: ""
  size: 20Gi

# ==================================================================================================
# Image-pull secrets — referenced by every pod to pull from a private registry. Default empty (public
# / already-authenticated registry). For a private Harbor / Aliyun ACR, create the secret with
# helm/Scripts/generate-image-repo-secret.sh and add its name here, e.g. [{ name: terrane-image-repo-secret }].
# ==================================================================================================
imagePullSecrets: []
