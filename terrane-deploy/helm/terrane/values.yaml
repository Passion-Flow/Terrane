# Default values for terrane.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

global:
  # Public domain of the FRONT app (knowledge base / Chat / memory / studio). Used by the ingress host
  # and to build the session-cookie scope. Example: terrane.example.com
  domain: "terrane.example.com"
  # Public domain of the ADMIN console (activation / setup wizard / model channels / members).
  # Example: admin.terrane.example.com
  adminDomain: "admin.terrane.example.com"
  # Serve over HTTPS. When true the session cookie is marked Secure (browser only sends it over TLS)
  # and the ingress requests TLS. Default false for an HTTP bring-up — flip to true once you serve the
  # console over HTTPS, otherwise the browser drops the login cookie over HTTP and login never sticks.
  useTLS: false
  # IANA timezone for all backend pods. Example: Asia/Shanghai, UTC.
  timezone: "Asia/Shanghai"
  # Backend log level: DEBUG | INFO | WARNING | ERROR.
  logLevel: "INFO"
  # Public URL used to build verification / password-reset email links. Empty = auto-follow the
  # address the user actually visited (recommended). Set to pin a fixed URL, e.g. https://kb.example.com
  publicBaseUrl: ""
  # Default nodeSelector applied to every component pod unless the component overrides it. Empty = none.
  nodeSelector: {}
  # Extra labels applied to all Terrane workload Pods (Deployment/StatefulSet pod templates). Empty = none.
  podLabels: {}
  # Custom CA certificate — trust a self-signed / private-CA https endpoint (Xinchuang (domestic) intranet). When the
  # backend talks to a TLS DB / mail / object store signed by a private CA, enable this.
  customCA:
    # Turn on private-CA trust injection.
    enabled: false
    # Name of an existing Kubernetes Secret holding the CA certificate (PEM). Required when enabled.
    # NOTE: changing the CA secret needs a pod restart — the combined bundle is built once by an initContainer.
    existingSecret: ""
    # Key inside the Secret that contains the CA certificate.
    key: ca.crt
    # Mount path of the combined CA bundle inside the pods.
    mountPath: /etc/terrane/custom-ca
    # Init-container image that combines system CAs with the custom CA. For air-gapped clusters replace
    # with a private-registry image that ships /etc/ssl/certs/ca-certificates.crt (Debian) or /etc/ssl/cert.pem (Alpine).
    initImage: alpine:3.20

# Ingress exposes the front app + admin console on two hosts (global.domain / global.adminDomain).
# Disabled by default — private deployments usually front the Services with their own ingress /
# LoadBalancer / gateway. Enable this to let the chart create the Ingress object.
ingress:
  # Create the Ingress object.
  enabled: false
  # IngressClass name (e.g. nginx). Empty = cluster default ingress class.
  className: ""
  # Extra ingress annotations. Empty {} by default; uncomment the examples below for nginx-ingress
  # (large knowledge-base / video uploads + Chat SSE streaming).
  annotations: {}
  #  nginx.ingress.kubernetes.io/proxy-body-size: "320m"
  #  nginx.ingress.kubernetes.io/proxy-buffering: "off"
  #  nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
  # TLS termination at the ingress.
  tls:
    # Enable TLS (pair with global.useTLS=true once you have certificates).
    enabled: false
    # Secret holding the FRONT host certificate (global.domain). Fill when tls.enabled=true.
    secretName: ""
    # Secret holding the ADMIN host certificate (global.adminDomain). Fill when tls.enabled=true.
    adminSecretName: ""

# ==================================================================================================
# Application components. Each carries its own image block (default = Aliyun mirror, tag v1.0.0).
# ==================================================================================================

# ---- Front-end business control plane (terrane-server) — knowledge base / retrieval / Chat assistant / studio / memory.
server:
  # Deploy this component.
  enabled: true
  # Container image for this component.
  image:
    # Full image repository. Defaults to the Aliyun mirror; point at your private Harbor for on-prem.
    repository: crpi-ew8juv9423tvogc4.cn-hongkong.personal.cr.aliyuncs.com/navtra-mirror/terrane-server
    # Image tag.
    tag: v1.0.0
    # imagePullPolicy: IfNotPresent | Always | Never.
    pullPolicy: IfNotPresent
  # Replica count. Keep 1 unless the license PVC is ReadWriteMany (state is shared via the license volume).
  replicas: 1
  # CPU/memory requests + limits. Empty {} = no limit (recommended to set in production). Demo below.
  resources: {}
  #  requests:
  #    cpu: 250m
  #    memory: 512Mi
  #  limits:
  #    cpu: 2
  #    memory: 2Gi
  # ServiceAccount for the pod. Empty = namespace default.
  serviceAccountName: ""
  # Pod scheduling controls (override global.nodeSelector when set).
  nodeSelector: {}
  affinity: {}
  tolerations: []
  # Readiness probe (start serving once /livez passes). initialDelay covers DB migration on first boot.
  readinessProbe:
    httpGet:
      path: /livez
      port: 43001
    initialDelaySeconds: 20
    periodSeconds: 10
    failureThreshold: 30
  # Liveness probe.
  livenessProbe:
    httpGet:
      path: /livez
      port: 43001
    initialDelaySeconds: 60
    periodSeconds: 30
    failureThreshold: 3
  # Extra environment variables appended to the container. Demo below.
  extraEnv: []
  # extraEnv:
  #   - name: TERRANE_SOME_FLAG
  #     value: "1"

# ---- Admin control plane (terrane-admin-server) — activation / setup wizard / model channels / members.
