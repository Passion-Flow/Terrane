{{- if .Values.server.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "terrane.fullname" . }}-server
  labels: {{- include "terrane.labels" . | nindent 4 }}
spec:
  selector: { app: {{ include "terrane.fullname" . }}-server }
  ports: [{ name: http, port: 43001, targetPort: 43001 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "terrane.fullname" . }}-server
  labels: {{- include "terrane.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.server.replicas }}
  selector: { matchLabels: { app: {{ include "terrane.fullname" . }}-server } }
  strategy: { type: Recreate }                  # shares the license RWO/RWX PVC
  template:
    metadata:
      labels:
        app: {{ include "terrane.fullname" . }}-server
        {{- include "terrane.labels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.server.serviceAccountName }}
      serviceAccountName: {{ .Values.server.serviceAccountName | quote }}
      {{- end }}
      {{- with (.Values.server.nodeSelector | default .Values.global.nodeSelector) }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.server.affinity }}
      affinity: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.server.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: server
          image: {{ include "terrane.image" .Values.server.image | quote }}
          imagePullPolicy: {{ .Values.server.image.pullPolicy }}
          command: ["sh", "-c", "python -m alembic upgrade head && python main.py"]
          envFrom:
            - configMapRef: { name: {{ include "terrane.fullname" . }}-config }
            - secretRef:    { name: {{ include "terrane.fullname" . }}-secret }
          env:
            - name: DATABASE_NAME
              value: terrane_main
            - name: TERRANE_LICENSE_STATE_PATH
              value: /var/lib/terrane/license/state_server.json
            {{- with .Values.server.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports: [{ name: http, containerPort: 43001 }]
          {{- with .Values.server.readinessProbe }}
          readinessProbe: {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.server.livenessProbe }}
          livenessProbe: {{- toYaml . | nindent 12 }}
          {{- end }}
          resources: {{- toYaml .Values.server.resources | nindent 12 }}
          volumeMounts:
            - name: license
              mountPath: /var/lib/terrane/license
      volumes:
        - name: license
          persistentVolumeClaim: { claimName: {{ include "terrane.fullname" . }}-license }
{{- end }}
