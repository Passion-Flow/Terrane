# ==================================================================================================
# Terrane — production docker-compose (private / on-prem / air-gapped). Single host, full stack.
#   cp .env.example .env   &&   edit .env (fill every #REPLACE_ME# — KEK + DB/Redis passwords)
#   docker compose up -d
# Brings up the FULL stack incl. the bundled PostgreSQL 18 (+ Apache AGE + pgvector) and Redis.
# To use an EXTERNAL database instead, point DATABASE_* in .env at it (it MUST have the `age` and
# `vector` extensions available) and remove/comment the bundled `postgres` service below.
# 5 app images + 1 datastore image, multi-arch amd64+arm64, tag v1.0.0.
# ==================================================================================================

# Shared backend env for the two Python control planes (terrane-server / terrane-admin-server).
# Each service overrides DATABASE_NAME + its license verifier-state path.
x-shared-env: &backend-env
  TERRANE_LOG_LEVEL: ${LOG_LEVEL:-INFO}
  TZ: ${TZ:-Asia/Shanghai}
  # Session cookie Secure flag: keep TRUE behind TLS; set FALSE ONLY for a plain-HTTP trial,
  # otherwise the browser drops the cookie over HTTP and login silently never sticks.
  SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
  # ---- database (one PostgreSQL, two logical DBs: terrane_main + terrane_admin) ----
  DATABASE_HOST: ${DATABASE_HOST:-postgres}
  DATABASE_PORT: ${DATABASE_PORT:-5432}
  DATABASE_USERNAME: ${DATABASE_USERNAME:-terrane_app}
  DATABASE_PASSWORD: ${DATABASE_PASSWORD:-#REPLACE_ME#}
  DATABASE_SSL_MODE: ${DATABASE_SSL_MODE:-disable}
  # ---- cache ----
  CACHE_HOST: ${CACHE_HOST:-redis}
  CACHE_PORT: ${CACHE_PORT:-6379}
  CACHE_PASSWORD: ${CACHE_PASSWORD:-#REPLACE_ME#}
  # ---- field-encryption master key (KEK): SMTP/2FA/credentials. Lose it → existing ciphertext is unrecoverable.
  TERRANE_KEK: ${TERRANE_KEK:-#REPLACE_ME#}
  # ---- License: online activation edge (Forge). Empty = offline activation only.
  TERRANE_FORGE_EDGE_URL: ${TERRANE_FORGE_EDGE_URL:-}
  # License files live on the SHARED `license` volume so both control planes share one deployment
  # identity (anti-clone double-lock) and activation persists across restarts.
  TERRANE_LICENSE_PATH: /var/lib/terrane/license/active.forge
  TERRANE_LICENSE_CRL_PATH: /var/lib/terrane/license/crl.forge
  # ---- private CA (optional): trust a self-signed / private-CA https endpoint (信创 intranet) ----
  SSL_CERT_FILE: ${TERRANE_CA_FILE:+/etc/terrane/ca-bundle.crt}
  REQUESTS_CA_BUNDLE: ${TERRANE_CA_FILE:+/etc/terrane/ca-bundle.crt}
  CURL_CA_BUNDLE: ${TERRANE_CA_FILE:+/etc/terrane/ca-bundle.crt}

x-registry: &registry ${REGISTRY:-crpi-ew8juv9423tvogc4.cn-hongkong.personal.cr.aliyuncs.com/navtra-mirror}

services:
  # ---- 前台业务控制面 (terrane-server, internal :43001) ----------------------------------------
  terrane-server:
    image: ${REGISTRY:-crpi-ew8juv9423tvogc4.cn-hongkong.personal.cr.aliyuncs.com/navtra-mirror}/terrane-server:${TERRANE_TAG:-v1.0.0}
    restart: always
    environment:
      <<: *backend-env
      DATABASE_NAME: terrane_main
      TERRANE_LICENSE_STATE_PATH: /var/lib/terrane/license/state_server.json
    command: ["sh", "-c", "python -m alembic upgrade head && python main.py"]
    volumes:
      - license:/var/lib/terrane/license
      - ${TERRANE_CA_FILE:-/dev/null}:/etc/terrane/ca-bundle.crt:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:43001/livez || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    depends_on:
      # required:false → if you comment out the bundled PG/Redis to use an external one, this won't error.
      postgres: { condition: service_healthy, required: false }
      redis: { condition: service_healthy, required: false }
    networks: [internal]

  # ---- 后台管理控制面 (terrane-admin-server, internal :43003) — 迁移 + 出厂建超管 --------------
  terrane-admin-server:
    image: ${REGISTRY:-crpi-ew8juv9423tvogc4.cn-hongkong.personal.cr.aliyuncs.com/navtra-mirror}/terrane-admin-server:${TERRANE_TAG:-v1.0.0}
    restart: always
    environment:
      <<: *backend-env
      DATABASE_NAME: terrane_admin
      TERRANE_LICENSE_STATE_PATH: /var/lib/terrane/license/state_admin.json
    command: ["sh", "-c", "python -m app.cli migrate up && python -m app.cli bootstrap --silent && python main.py"]
    volumes:
      - license:/var/lib/terrane/license
      - ${TERRANE_CA_FILE:-/dev/null}:/etc/terrane/ca-bundle.crt:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:43003/livez || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    depends_on:
      # required:false → if you comment out the bundled PG/Redis to use an external one, this won't error.
      postgres: { condition: service_healthy, required: false }
      redis: { condition: service_healthy, required: false }
    networks: [internal]

  # ---- 数据面网关 (Go) -------------------------------------------------------------------------
  terrane-gateway:
    image: ${REGISTRY:-crpi-ew8juv9423tvogc4.cn-hongkong.personal.cr.aliyuncs.com/navtra-mirror}/terrane-gateway:${TERRANE_TAG:-v1.0.0}
    restart: always
    environment:
      TERRANE_LICENSE_STATE_PATH: /var/lib/terrane/license/state_gateway.json
    volumes:
      - license:/var/lib/terrane/license
    depends_on:
      terrane-server: { condition: service_healthy }
    networks: [internal]

  # ---- 前台 Web (nginx SPA + /api 反代 terrane-server) -----------------------------------------
  terrane-web:
    image: ${REGISTRY:-crpi-ew8juv9423tvogc4.cn-hongkong.personal.cr.aliyuncs.com/navtra-mirror}/terrane-web:${TERRANE_TAG:-v1.0.0}
    restart: always
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      terrane-server: { condition: service_healthy }
    networks: [internal, public]

  # ---- 后台 Web (nginx SPA + /admin-api 反代 terrane-admin-server) ------------------------------
  terrane-admin-web:
    image: ${REGISTRY:-crpi-ew8juv9423tvogc4.cn-hongkong.personal.cr.aliyuncs.com/navtra-mirror}/terrane-admin-web:${TERRANE_TAG:-v1.0.0}
    restart: always
    ports:
      - "${ADMIN_WEB_PORT:-8081}:80"
    depends_on:
      terrane-admin-server: { condition: service_healthy }
    networks: [internal, public]

  # ============================================================================================
  # Bundled datastores (default on). Production: a managed PG18 with AGE+pgvector is also fine —
  # point DATABASE_* in .env at it and remove this service.
  # ============================================================================================
  postgres:
    # PostgreSQL 18 + Apache AGE (knowledge graph) + pgvector (semantic retrieval). REQUIRED stack —
    # Terrane will not run on a plain DB without these extensions.
    # Bundled and started BY DEFAULT (single-host appliance). To use an EXTERNAL/managed/信创 PG
    # instead, point DATABASE_HOST in .env at it and comment out this `postgres` service.
    image: ${REGISTRY:-crpi-ew8juv9423tvogc4.cn-hongkong.personal.cr.aliyuncs.com/navtra-mirror}/terrane-postgres:${TERRANE_TAG:-v1.0.0}
    restart: always
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME:-terrane_app}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-#REPLACE_ME#}
      POSTGRES_DB: postgres
      TZ: ${TZ:-Asia/Shanghai}
    command: ["postgres", "-c", "shared_preload_libraries=age"]
    volumes:
      - pgdata:/var/lib/postgresql          # PG18+: mount the PARENT dir (data lands in a versioned subdir)
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-terrane_app}"]
      interval: 5s
      timeout: 5s
      retries: 30
    networks: [internal]

  redis:
    # terrane-redis = upstream redis:7-alpine re-tagged, pulled from the same registry as the rest
    # (one registry for air-gapped / 信创 delivery). Started BY DEFAULT. To use an EXTERNAL Redis,
    # point CACHE_HOST in .env at it and comment out this `redis` service.
    image: ${REGISTRY:-crpi-ew8juv9423tvogc4.cn-hongkong.personal.cr.aliyuncs.com/navtra-mirror}/terrane-redis:${TERRANE_TAG:-v1.0.0}
    restart: always
    command: ["redis-server", "--requirepass", "${CACHE_PASSWORD:-#REPLACE_ME#}", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${CACHE_PASSWORD:-#REPLACE_ME#}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 30
    networks: [internal]

volumes:
  pgdata:
  redisdata:
  license:        # shared by terrane-server + terrane-admin-server + terrane-gateway

networks:
  internal:       # control planes + datastores; not reachable from outside
  public:         # only terrane-web + terrane-admin-web attach here
