<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 340" width="1280" height="340" role="img" aria-label="Terrane — open-source AI knowledge base">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06181b"/><stop offset="0.55" stop-color="#041012"/><stop offset="1" stop-color="#010708"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#27a6a4" stop-opacity="0.55"/><stop offset="1" stop-color="#27a6a4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="word" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#dffff4"/><stop offset="0.5" stop-color="#8df3d6"/><stop offset="1" stop-color="#2bb0a6"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1280" height="340" fill="url(#bg)"/>
  <rect width="1280" height="340" fill="url(#glow)" opacity="0.5">
    <animate attributeName="opacity" values="0.35;0.6;0.35" dur="6s" repeatCount="indefinite"/>
  </rect>
  <g fill="#2bb0a6" opacity="0.10">
    <circle cx="40" cy="40" r="1.4"/><circle cx="120" cy="300" r="1.4"/><circle cx="1240" cy="60" r="1.4"/>
    <circle cx="1180" cy="295" r="1.4"/><circle cx="980" cy="40" r="1.4"/><circle cx="700" cy="312" r="1.4"/>
  </g>

  <!-- ================= LEFT: official Terrane logo ================= -->
  <g transform="translate(112 170)">
    <circle r="86" fill="url(#glow)">
      <animate attributeName="r" values="80;94;80" dur="5s" repeatCount="indefinite"/>
    </circle>
    <!-- pulsing knowledge ring -->
    <circle r="60" fill="none" stroke="#43e6c6" stroke-width="1.2" opacity="0">
      <animate attributeName="r" values="52;76" dur="3.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0" dur="3.4s" repeatCount="indefinite"/>
    </circle>
    <!-- favicon logo (viewBox 64), scaled ×1.72, centered: translate(-55,-55) -->
    <g transform="translate(-55 -55) scale(1.72)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.8s" begin="0.3s" fill="freeze"/>
      <rect width="64" height="64" rx="15" fill="#0b1012" stroke="#27a6a4" stroke-opacity="0.35" stroke-width="0.8"/>
      <g transform="rotate(-6 32 32)">
        <rect x="15" y="17" width="34" height="27" rx="6" fill="none" stroke="#ffffff" stroke-width="1.7"/>
      </g>
      <rect x="14" y="24" width="36" height="25" rx="6" fill="#ffffff"/>
      <path d="M16 26 a3 3 0 0 1 3 -3 h7 a2.5 2.5 0 0 1 2.2 1.4 l1.2 2.2 h2 v3 h-17.6 z" fill="#ffffff"/>
      <text x="32" y="42.3" text-anchor="middle" font-family="Geist, system-ui, sans-serif" font-size="19" font-weight="800" fill="#0a0a0a">T</text>
    </g>
  </g>

  <!-- ================= CENTER: wordmark + tagline + pills ================= -->
  <g transform="translate(300 0)">
    <text x="0" y="158" font-family="Geist, system-ui, -apple-system, Segoe UI, sans-serif" font-size="88" font-weight="800"
          letter-spacing="-2" fill="url(#word)" opacity="0">Terrane
      <animate attributeName="opacity" from="0" to="1" dur="0.9s" begin="0.6s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" from="-14 0" to="0 0" dur="0.9s" begin="0.6s" fill="freeze"/>
    </text>
    <text x="3" y="196" font-family="Geist, system-ui, -apple-system, sans-serif" font-size="21" font-weight="500" fill="#9fdfd2" opacity="0">
      Open-source AI knowledge base · knowledge graph · reasoning retrieval · CPU-only
      <animate attributeName="opacity" from="0" to="1" dur="0.9s" begin="1.1s" fill="freeze"/>
    </text>
    <g font-family="Geist, system-ui, sans-serif" font-size="14.5" font-weight="600">
      <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.5s" fill="freeze"/>
        <rect x="3" y="222" rx="13" width="158" height="27" fill="#0c2e34" stroke="#27a6a4" stroke-opacity="0.5"/>
        <text x="82" y="240" text-anchor="middle" fill="#8df3d6">Knowledge Graph</text></g>
      <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.65s" fill="freeze"/>
        <rect x="171" y="222" rx="13" width="186" height="27" fill="#0c2e34" stroke="#27a6a4" stroke-opacity="0.5"/>
        <text x="264" y="240" text-anchor="middle" fill="#8df3d6">Hybrid · Reasoning Retrieval</text></g>
      <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.8s" fill="freeze"/>
        <rect x="367" y="222" rx="13" width="120" height="27" fill="#0c2e34" stroke="#27a6a4" stroke-opacity="0.5"/>
        <text x="427" y="240" text-anchor="middle" fill="#8df3d6">Multimodal</text></g>
      <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.95s" fill="freeze"/>
        <rect x="497" y="222" rx="13" width="92" height="27" fill="#0c2e34" stroke="#27a6a4" stroke-opacity="0.5"/>
        <text x="543" y="240" text-anchor="middle" fill="#8df3d6">Studio</text></g>
      <g opacity="0"><animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="2.1s" fill="freeze"/>
        <rect x="599" y="222" rx="13" width="98" height="27" fill="#0c2e34" stroke="#27a6a4" stroke-opacity="0.5"/>
        <text x="648" y="240" text-anchor="middle" fill="#8df3d6">Memory</text></g>
    </g>
  </g>

  <!-- ================= RIGHT: knowledge-graph motif (moved right to clear the tagline) ================= -->
  <g transform="translate(1182 156)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="1s" begin="1.4s" fill="freeze"/>
    <g stroke="#27a6a4" stroke-width="1.4" stroke-opacity="0.55">
      <line x1="0" y1="0" x2="64" y2="-44"/><line x1="0" y1="0" x2="72" y2="36"/>
      <line x1="0" y1="0" x2="-40" y2="-66"/><line x1="0" y1="0" x2="-58" y2="40"/>
      <line x1="0" y1="0" x2="8" y2="74"/><line x1="64" y1="-44" x2="72" y2="36"/>
      <line x1="-40" y1="-66" x2="-58" y2="40"/>
    </g>
    <g fill="#04161a" stroke="#43e6c6" stroke-width="1.6">
      <circle cx="0" cy="0" r="11" fill="#0c5563"/>
      <circle cx="64" cy="-44" r="7"><animate attributeName="r" values="7;9;7" dur="3s" begin="0s" repeatCount="indefinite"/></circle>
      <circle cx="72" cy="36" r="6"><animate attributeName="r" values="6;8;6" dur="3s" begin="0.6s" repeatCount="indefinite"/></circle>
      <circle cx="-40" cy="-66" r="6"><animate attributeName="r" values="6;8;6" dur="3s" begin="1.2s" repeatCount="indefinite"/></circle>
      <circle cx="-58" cy="40" r="7"><animate attributeName="r" values="7;9;7" dur="3s" begin="1.8s" repeatCount="indefinite"/></circle>
      <circle cx="8" cy="74" r="6"><animate attributeName="r" values="6;8;6" dur="3s" begin="2.4s" repeatCount="indefinite"/></circle>
    </g>
    <circle r="3.2" fill="#bff7e6">
      <animateMotion dur="2.2s" begin="2s" repeatCount="indefinite" path="M 0 0 L 64 -44"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="2.2s" begin="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <rect x="0" y="338" width="1280" height="2" fill="url(#word)" opacity="0.5"/>
</svg>
